<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOSERBA MAJU — Katalog Harga</title>
<meta name="description" content="Katalog Produk & Harga Terbaru — 0 produk">
<style>
:root {
    --primary: #2563eb; --primary-light: #eff6ff;
    --success: #16a34a; --danger: #dc2626;
    --bg: #f8fafc; --surface: #fff; --text: #0f172a; --text2: #64748b;
    --border: #e2e8f0; --shadow: 0 1px 3px rgba(0,0,0,.06);
    --radius: 10px; --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); }

.header {
    background: linear-gradient(135deg, #1e3a5f, var(--primary));
    color: #fff; padding: 32px 20px; text-align: center;
}
.header h1 { font-size: 28px; margin-bottom: 4px; }
.header p { opacity: .8; font-size: 14px; }
.header .stats { margin-top: 12px; font-size: 13px; opacity: .7; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

.search-bar {
    position: sticky; top: 0; z-index: 10;
    background: var(--surface); padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
}
.search-bar input {
    width: 100%; padding: 12px 16px; border: 2px solid var(--border);
    border-radius: var(--radius); font-size: 16px; outline: none;
    font-family: var(--font);
}
.search-bar input:focus { border-color: var(--primary); }

.chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 20px; }
.chip {
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
    border: 1.5px solid var(--border); background: var(--surface);
    cursor: pointer; font-family: var(--font); transition: .15s;
}
.chip:hover, .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.category-section { margin-bottom: 32px; }
.category-title {
    font-size: 18px; font-weight: 700; padding: 8px 0;
    border-bottom: 2px solid var(--primary); margin-bottom: 16px;
    color: var(--primary);
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
}
.product-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow); border: 1px solid var(--border);
    transition: .15s;
}
.product-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); transform: translateY(-1px); }
.product-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
.product-price {
    font-size: 20px; font-weight: 800; color: var(--primary);
    font-family: 'Consolas', monospace; margin-bottom: 8px;
}
.product-meta { display: flex; justify-content: space-between; align-items: center; }
.product-barcode { font-size: 11px; color: var(--text2); font-family: monospace; }
.stock-badge {
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
}
.in-stock { background: #dcfce7; color: var(--success); }
.out-stock { background: #fef2f2; color: var(--danger); }

.footer {
    text-align: center; padding: 24px; color: var(--text2); font-size: 13px;
    border-top: 1px solid var(--border); margin-top: 40px;
}

@media (max-width: 600px) {
    .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .header h1 { font-size: 22px; }
}
</style>
</head>
<body>

<div class="header">
    <h1>TOSERBA MAJU</h1>
    <p>Katalog Produk & Harga Terbaru</p>
    <div class="stats">0 produk · Update: 14 June 2026, 09:37</div>
</div>

<div class="search-bar">
    <input type="text" id="search" placeholder="🔍 Cari produk..." oninput="searchProducts(this.value)">
</div>

<div class="chips">
    <button class="chip active" onclick="filterCategory(null)">Semua (0)</button>
    
</div>

<div class="container" id="catalog">
    
</div>

<div class="footer">
    TOSERBA MAJU · Harga dapat berubah sewaktu-waktu<br>
    Powered by POS Toserba
</div>

<script>
function searchProducts(q) {
    q = q.toLowerCase();
    document.querySelectorAll('.product-card').forEach(card => {
        const name = card.querySelector('.product-name').textContent.toLowerCase();
        const barcode = card.querySelector('.product-barcode').textContent.toLowerCase();
        card.style.display = (name.includes(q) || barcode.includes(q)) ? '' : 'none';
    });
    // Show all categories when searching
    document.querySelectorAll('.category-section').forEach(s => {
        const visible = s.querySelectorAll('.product-card[style=""], .product-card:not([style])');
        s.style.display = visible.length ? '' : 'none';
    });
}

function filterCategory(catId) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');

    document.querySelectorAll('.category-section').forEach(s => {
        if (catId === null) {
            s.style.display = '';
        } else {
            s.style.display = s.id === 'cat-' + catId ? '' : 'none';
        }
    });
    document.querySelectorAll('.product-card').forEach(c => c.style.display = '');
    document.getElementById('search').value = '';
}
</script>
</body>
</html>
